<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* CONTAINER */

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:14px;

width:100%;
height:100vh;
text-align:center;
}

/* LOGO (MAIOR E MAIS DOMINANTE) */

.logo{
width:min(96vw,1600px);
max-height:78vh;
object-fit:contain;

opacity:0;
animation:logoFade 1.4s ease forwards;
animation-delay:.6s;
}

/* LINHA */

.line{
width:80px;
height:1px;
background:linear-gradient(90deg,transparent,#fff,transparent);

opacity:0;
animation:fadeIn .8s ease forwards;
animation-delay:1.4s;
}

/* TEXTO */

.text{
font-size:clamp(11px,1vw,14px);
letter-spacing:6px;
text-transform:uppercase;
font-weight:500;

background:linear-gradient(
90deg,
rgba(255,255,255,.25) 0%,
rgba(255,255,255,1) 50%,
rgba(255,255,255,.25) 100%
);

background-size:200% auto;
color:transparent;
background-clip:text;
-webkit-background-clip:text;

opacity:0;
animation:shineMove 3.2s linear infinite,fadeIn .8s ease forwards;
animation-delay:1.6s;
}

/* HOVER SUAVE */

.container:hover .logo{
transform:translateY(-1px);
transition:.4s ease;
}

/* OVERLAY DEVTOOLS */

#devtools-overlay{
position:fixed;
inset:0;
background:#000;
color:#fff;
display:none;
align-items:center;
justify-content:center;
z-index:9999;

font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
}

/* ANIMAÇÕES */

@keyframes logoFade{
to{opacity:1;}
}

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes shineMove{
0%{background-position:-200% center;}
100%{background-position:200% center;}
}

/* MOBILE */

@media (max-width:600px){

.logo{
width:96vw;
max-height:68vh;
}

.text{
font-size:10px;
letter-spacing:5px;
}

.line{
width:60px;
}

}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL Logo">

<div class="line"></div>

<div class="text">
EM BREVE
</div>

</div>

<div id="devtools-overlay">
acesso restrito
</div>

<script>

/* BLOQUEIO BÁSICO */

document.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('keydown',function(e){

if(e.key==='F12') e.preventDefault();

if(e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase()))
e.preventDefault();

if(e.ctrlKey && ['U','S'].includes(e.key.toUpperCase()))
e.preventDefault();

});

/* DETECTAR DEVTOOLS */

(function(){

const threshold=160;
const overlay=document.getElementById('devtools-overlay');

setInterval(()=>{

const widthDiff=window.outerWidth-window.innerWidth;
const heightDiff=window.outerHeight-window.innerHeight;

if(widthDiff>threshold || heightDiff>threshold){

overlay.style.display='flex';

}else{

overlay.style.display='none';

}

},500);

})();

</script>

</body>
</html>
