<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* CONTAINER */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;

  max-width: 95vw;
  padding: 20px;

  opacity: 0;
  animation: fadeInContainer 1.2s ease forwards;
  animation-delay: 0.4s;
}

/* LOGO CINEMATOGRÁFICA */
.logo {
  width: clamp(420px, 90vw, 1200px);
  max-height: 75vh;
  object-fit: contain;

  opacity: 0;
  transform: scale(0.92) translateY(20px);
  filter: brightness(0.9);

  animation: logoCinematic 1.8s cubic-bezier(.19,1,.22,1) forwards;
  animation-delay: 0.8s;
}

/* LINHA */
.line {
  width: 90px;
  height: 1px;
  margin-top: 24px;
  margin-bottom: 18px;
  background: linear-gradient(90deg, transparent, #fff, transparent);

  opacity: 0;
  transform: scaleX(0.6);

  animation: lineReveal 1s ease forwards;
  animation-delay: 1.6s;
}

/* TEXTO PREMIUM */
.text {
  font-size: clamp(14px, 1.3vw, 18px);
  letter-spacing: 14px;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
  font-weight: 400;

  opacity: 0;
  transform: translateY(10px);

  animation: textReveal 1.2s cubic-bezier(.19,1,.22,1) forwards;
  animation-delay: 1.9s;
}

/* HOVER ULTRA SUTIL */
.container:hover .logo {
  transform: scale(1.01) translateY(-2px);
  filter: brightness(1.05);
}

/* OVERLAY */
#devtools-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  font-size: 14px;
  letter-spacing: 2px;
}

/* ANIMAÇÕES */
@keyframes fadeInContainer {
  to { opacity: 1; }
}

@keyframes logoCinematic {
  0% {
    opacity: 0;
    transform: scale(0.92) translateY(30px);
    filter: blur(6px) brightness(0.8);
  }
  60% {
    opacity: 1;
    transform: scale(1.01) translateY(0);
    filter: blur(0) brightness(1.05);
  }
  100% {
    transform: scale(1) translateY(0);
    filter: brightness(1);
  }
}

@keyframes lineReveal {
  to {
    opacity: 1;
    transform: scaleX(1);
  }
}

@keyframes textReveal {
  0% {
    opacity: 0;
    letter-spacing: 22px;
    transform: translateY(12px);
  }
  100% {
    opacity: 1;
    letter-spacing: 14px;
    transform: translateY(0);
  }
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .logo { width: 92vw; max-height: 65vh; }
  .text { letter-spacing: 10px; }
}

@media (max-width: 600px) {
  .logo { width: 94vw; max-height: 60vh; }

  .text {
    font-size: 13px;
    letter-spacing: 6px;
  }

  .line { width: 60px; }
}
</style>
</head>

<body>

<div class="container">
  <img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL Logo">
  <div class="line"></div>
  <div class="text">EM BREVE</div>
</div>

<div id="devtools-overlay">
  acesso restrito
</div>

<script>
// 🔒 bloqueio básico
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', function(e) {
  if (e.key === 'F12') e.preventDefault();

  if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) {
    e.preventDefault();
  }

  if (e.ctrlKey && ['U','S'].includes(e.key.toUpperCase())) {
    e.preventDefault();
  }
});

// 🔍 detectar DevTools
(function() {
  const threshold = 160;
  const overlay = document.getElementById('devtools-overlay');

  setInterval(() => {
    const widthDiff = window.outerWidth - window.innerWidth;
    const heightDiff = window.outerHeight - window.innerHeight;

    if (widthDiff > threshold || heightDiff > threshold) {
      overlay.style.display = 'flex';
    } else {
      overlay.style.display = 'none';
    }
  }, 500);
})();
</script>

</body>
</html>
