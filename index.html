<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-family:'Inter',sans-serif;
overflow:hidden;
color:white;
}

/* CONTAINER */

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;

width:100%;
height:100vh;
gap:18px;
}

/* LOGO */

.logo{
width:min(92vw,1400px);
height:auto;
object-fit:contain;

opacity:0;
animation:logoFade 1.4s ease forwards;
animation-delay:0.6s;

transition:transform .4s ease;
}

/* LINHA */

.line{
width:70px;
height:1px;

background:linear-gradient(90deg,transparent,#ffffff90,transparent);

opacity:0;
animation:fadeIn .8s ease forwards;
animation-delay:1.6s;
}

/* TEXTO */

.text{

font-size:12px;
letter-spacing:6px;
text-transform:uppercase;
font-weight:500;

background:linear-gradient(
90deg,
rgba(255,255,255,0.3),
rgba(255,255,255,1),
rgba(255,255,255,0.3)
);

background-size:200% auto;

-webkit-background-clip:text;
background-clip:text;

color:transparent;

opacity:0;

animation:
fadeIn 1s ease forwards 1.9s,
shineMove 4s linear infinite 2.2s;

}

/* HOVER */

.container:hover .logo{
transform:translateY(-3px) scale(1.01);
}

/* OVERLAY */

#devtools-overlay{
position:fixed;
inset:0;
background:#000;
color:#fff;
display:none;
align-items:center;
justify-content:center;
z-index:9999;

font-size:13px;
letter-spacing:3px;
}

/* ANIMAÇÕES */

@keyframes logoFade{
to{opacity:1;}
}

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes shineMove{
0%{background-position:-200% center;}
100%{background-position:200% center;}
}

/* MOBILE */

@media(max-width:600px){

.logo{
width:92vw;
}

.text{
font-size:11px;
letter-spacing:5px;
}

.line{
width:55px;
}

}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL Logo">

<div class="line"></div>

<div class="text">EM BREVE</div>

</div>

<div id="devtools-overlay">
ACESSO RESTRITO
</div>

<script>

/* BLOQUEIO */

document.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('keydown',function(e){

if(e.key==='F12') e.preventDefault();

if(e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())){
e.preventDefault();
}

if(e.ctrlKey && ['U','S'].includes(e.key.toUpperCase())){
e.preventDefault();
}

});

/* DETECTAR DEVTOOLS */

(function(){

const threshold=160;
const overlay=document.getElementById('devtools-overlay');

setInterval(()=>{

const widthDiff=window.outerWidth-window.innerWidth;
const heightDiff=window.outerHeight-window.innerHeight;

if(widthDiff>threshold || heightDiff>threshold){

overlay.style.display='flex';

}else{

overlay.style.display='none';

}

},500);

})();

</script>

</body>
</html>
