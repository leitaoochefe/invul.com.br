<!DOCTYPE html>
<html lang="pt-BR">
<head>

<!-- Google Analytics -->

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-HZTLMTJCPY');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link rel="icon" href="https://invul.netlify.app/navegador.png">
<link rel="shortcut icon" href="https://invul.netlify.app/navegador.png">
<link rel="apple-touch-icon" href="https://invul.netlify.app/navegador.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:#000;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* CONTAINER */
.container{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* LOGO 🔥 FULL SCREEN */
.logo{
position:absolute;
width:100vw;
height:100vh;
object-fit:contain;
opacity:0;
animation:logoFade 1.4s ease forwards;
}

/* TEXTO */
.text{
position:absolute;
bottom:70px;
font-size:12px;
letter-spacing:6px;
text-transform:uppercase;
font-weight:500;

background:linear-gradient(
90deg,
rgba(255,255,255,.25),
rgba(255,255,255,1),
rgba(255,255,255,.25)
);

background-size:200% auto;
color:transparent;
background-clip:text;
-webkit-background-clip:text;

opacity:0;
animation:shineMove 3s linear infinite, fadeIn .8s ease forwards;
animation-delay:1.6s;
}

/* EMAIL FOOTER */
.footer{
position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:10px;
font-size:13px;
letter-spacing:1px;
opacity:0;
animation:fadeIn 1s ease forwards;
animation-delay:2.2s;
}

.footer a{
color:#fff;
text-decoration:none;
opacity:.85;
transition:.3s;
}

.footer a:hover{
opacity:.5;
}

.email-icon{
width:18px;
height:18px;
fill:#fff;
opacity:.85;
}

/* ANIMAÇÕES */
@keyframes logoFade{
to{opacity:1;}
}

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes shineMove{
0%{background-position:-200% center;}
100%{background-position:200% center;}
}

/* MOBILE */
@media (max-width:600px){

.text{
font-size:10px;
letter-spacing:5px;
bottom:60px;
}

.footer{
font-size:12px;
bottom:8px;
}

}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL Logo">

<div class="text">
EM BREVE
</div>

</div>

<div class="footer">

<svg class="email-icon" viewBox="0 0 24 24">
<path d="M2 4h20v16H2V4zm10 9L3 6v12h18V6l-9 7z"/>
</svg>

<a href="mailto:contato@invul.com.br">
contato@invul.com.br
</a>

</div>

</body>
</html>
