<!DOCTYPE html>
<html lang="pt-BR">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HZTLMTJCPY"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-HZTLMTJCPY');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link rel="icon" href="https://invul.netlify.app/navegador.png">
<link rel="apple-touch-icon" href="https://invul.netlify.app/navegador.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Inter',sans-serif;
color:#fff;

/* fundo estilo Apple launch */
background:
radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08), transparent 40%),
radial-gradient(circle at 50% 120%, rgba(255,255,255,0.05), transparent 50%),
#000;

display:flex;
align-items:center;
justify-content:center;
}

/* leve textura premium */
body::before{
content:"";
position:fixed;
inset:0;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:.08;
mix-blend-mode:overlay;
pointer-events:none;
}

/* CONTAINER */
.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:18px;
text-align:center;
animation:fadeUp 1.8s ease forwards;
opacity:0;
}

/* LOGO */
.logo{
width:min(92vw,1500px);
max-height:72vh;
object-fit:contain;

filter:drop-shadow(0 30px 80px rgba(255,255,255,0.08));

transform:scale(1.05);
opacity:0;

animation:logoIn 2.2s ease forwards;
animation-delay:.4s;
}

/* linha premium */
.line{
width:90px;
height:1px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent);
opacity:0;

animation:fadeIn 1.5s ease forwards;
animation-delay:1.6s;
}

/* texto estilo keynote */
.text{
font-size:clamp(11px,1vw,14px);
letter-spacing:7px;
text-transform:uppercase;
font-weight:500;

color:rgba(255,255,255,.75);
opacity:0;

animation:fadeIn 1.5s ease forwards;
animation-delay:1.8s;
}

/* FOOTER */
.footer{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
gap:10px;

font-size:13px;
letter-spacing:1px;

opacity:0;
animation:fadeIn 2s ease forwards;
animation-delay:2.4s;
}

.footer a{
color:rgba(255,255,255,.85);
text-decoration:none;
transition:.4s ease;
}

.footer a:hover{
color:#fff;
}

.email-icon{
width:18px;
height:18px;
fill:#fff;
opacity:.85;
}

/* hover muito sutil */
.container:hover .logo{
transform:scale(1.055);
transition:1.2s ease;
}

/* DEVTOOLS */
#devtools-overlay{
position:fixed;
inset:0;
background:#000;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
font-size:12px;
letter-spacing:3px;
text-transform:uppercase;
}

/* ANIMAÇÕES */
@keyframes logoIn{
0%{
opacity:0;
transform:scale(1.1);
filter:blur(10px);
}
100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}
}

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:600px){

.line{width:60px;}
.text{font-size:10px;letter-spacing:5px;}
.footer{font-size:12px;bottom:10px;}

}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL">

<div class="line"></div>

<div class="text">EM BREVE</div>

</div>

<div class="footer">

<svg class="email-icon" viewBox="0 0 24 24">
<path d="M2 4h20v16H2V4zm10 9L3 6v12h18V6l-9 7z"/>
</svg>

<a href="mailto:contato@invul.com.br">
contato@invul.com.br
</a>

</div>

<div id="devtools-overlay">
acesso restrito
</div>

<script>

// bloqueios básicos
document.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('keydown',function(e){
if(e.key==='F12') e.preventDefault();
if(e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase()))
e.preventDefault();
if(e.ctrlKey && ['U','S'].includes(e.key.toUpperCase()))
e.preventDefault();
});

// detector devtools
(function(){
const threshold=160;
const overlay=document.getElementById('devtools-overlay');

setInterval(()=>{
const w=window.outerWidth-window.innerWidth;
const h=window.outerHeight-window.innerHeight;

if(w>threshold || h>threshold){
overlay.style.display='flex';
}else{
overlay.style.display='none';
}
},500);
})();

</script>

</body>
</html>
