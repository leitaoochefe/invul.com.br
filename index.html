<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
}

/* CONTAINER */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;

  opacity: 0;

  animation: fadeInContainer 1.2s ease forwards;
  animation-delay: 0.4s;
}

/* LOGO — MAIOR E MAIS IMPACTO */
.logo {
  width: clamp(420px, 90vw, 1200px);
  display: block;

  opacity: 0;

  animation: logoFade 1.6s ease forwards;
  animation-delay: 0.8s;
}

/* LINHA */
.line {
  width: 80px;
  height: 1px;
  margin-top: 20px;
  margin-bottom: 16px;
  background: linear-gradient(90deg, transparent, #fff, transparent);

  opacity: 0;

  animation: fadeIn 0.8s ease forwards;
  animation-delay: 1.6s;
}

/* TEXTO */
.text {
  font-size: clamp(14px, 1.2vw, 18px);
  letter-spacing: 8px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  font-weight: 400;

  opacity: 0;

  animation: fadeIn 0.8s ease forwards;
  animation-delay: 1.9s;
}

/* HOVER SUTIL */
.container:hover .logo {
  transform: translateY(-2px);
}

/* ANIMAÇÕES */

@keyframes fadeInContainer {
  to {
    opacity: 1;
  }
}

@keyframes logoFade {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}

/* RESPONSIVO */

@media (max-width: 900px) {
  .logo { width: 85vw; }
  .text { letter-spacing: 6px; }
}

@media (max-width: 600px) {
  .logo { width: 90vw; }
  .text {
    font-size: 13px;
    letter-spacing: 4px;
  }
  .line { width: 60px; }
}

</style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL Logo">

  <div class="line"></div>

  <div class="text">EM BREVE</div>

</div>

</body>
</html>
