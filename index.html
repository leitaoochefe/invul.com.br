<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* CONTAINER */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  width: 100%;
  height: 100vh;
}

/* WRAPPER DA LOGO */
.logo-wrapper {
  position: relative;
  display: inline-block;
}

/* LOGO */
.logo {
  width: min(98vw, 1600px);
  height: calc(100vh - 100px);
  object-fit: contain;

  display: block;

  opacity: 0;
  animation: logoFade 1.6s ease forwards;
  animation-delay: 0.8s;
}

/* 🔥 EFEITO DE BRILHO PASSANDO */
.logo-wrapper::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 60%;
  height: 100%;

  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.25) 40%,
    rgba(255,255,255,0.6) 50%,
    rgba(255,255,255,0.25) 60%,
    transparent 100%
  );

  transform: skewX(-20deg);

  animation: shineLogo 3s ease-in-out infinite;
}

/* LINHA */
.line {
  width: 90px;
  height: 1px;
  margin-top: 10px;
  margin-bottom: 8px;
  background: linear-gradient(90deg, transparent, #fff, transparent);

  opacity: 0;
  animation: fadeIn 0.8s ease forwards;
  animation-delay: 1.8s;
}

/* TEXTO */
.text {
  font-size: clamp(12px, 1.1vw, 16px);
  letter-spacing: 5px;
  color: rgba(255,255,255,0.65);
  text-transform: uppercase;

  opacity: 0;
  animation: fadeIn 0.8s ease forwards;
  animation-delay: 2s;
}

/* HOVER */
.container:hover .logo {
  transform: translateY(-2px);
}

/* OVERLAY */
#devtools-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  font-size: 14px;
  letter-spacing: 2px;
}

/* ANIMAÇÕES */
@keyframes logoFade {
  to { opacity: 1; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes shineLogo {
  0% {
    left: -150%;
  }
  100% {
    left: 150%;
  }
}

/* RESPONSIVO */
@media (max-width: 600px) {
  .logo {
    height: calc(100vh - 90px);
  }

  .text {
    font-size: 11px;
    letter-spacing: 4px;
  }

  .line {
    width: 60px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo-wrapper">
    <img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL Logo">
  </div>

  <div class="line"></div>
  <div class="text">EM BREVE</div>
</div>

<div id="devtools-overlay">
  acesso restrito
</div>

<script>
// 🔒 bloqueio básico
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', function(e) {
  if (e.key === 'F12') e.preventDefault();

  if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) {
    e.preventDefault();
  }

  if (e.ctrlKey && ['U','S'].includes(e.key.toUpperCase())) {
    e.preventDefault();
  }
});

// 🔍 detectar DevTools
(function() {
  const threshold = 160;
  const overlay = document.getElementById('devtools-overlay');

  setInterval(() => {
    const widthDiff = window.outerWidth - window.innerWidth;
    const heightDiff = window.outerHeight - window.innerHeight;

    if (widthDiff > threshold || heightDiff > threshold) {
      overlay.style.display = 'flex';
    } else {
      overlay.style.display = 'none';
    }
  }, 500);
})();
</script>

</body>
</html>
