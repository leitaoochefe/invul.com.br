<!DOCTYPE html>
<html lang="pt-BR">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HZTLMTJCPY"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-HZTLMTJCPY');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link rel="icon" href="https://invul.netlify.app/navegador.png">
<link rel="shortcut icon" href="https://invul.netlify.app/navegador.png">
<link rel="apple-touch-icon" href="https://invul.netlify.app/navegador.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* CONTAINER */

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:14px;
width:100%;
height:100vh;
text-align:center;
}

/* LOGO */

.logo{
width:min(96vw,1600px);
max-height:78vh;
object-fit:contain;

opacity:0;
animation:logoFade 1.4s ease forwards;
animation-delay:.6s;
}

/* LINHA */

.line{
width:80px;
height:1px;
background:linear-gradient(90deg,transparent,#fff,transparent);

opacity:0;
animation:fadeIn .8s ease forwards;
animation-delay:1.4s;
}

/* TEXTO */

.text{
font-size:clamp(11px,1vw,14px);
letter-spacing:6px;
text-transform:uppercase;
font-weight:500;

background:linear-gradient(
90deg,
rgba(255,255,255,.25) 0%,
rgba(255,255,255,1) 50%,
rgba(255,255,255,.25) 100%
);

background-size:200% auto;
color:transparent;
background-clip:text;
-webkit-background-clip:text;

opacity:0;
animation:shineMove 3.2s linear infinite,fadeIn .8s ease forwards;
animation-delay:1.6s;
}

/* EMAIL FOOTER */

.footer{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
gap:10px;

font-size:13px;
letter-spacing:1px;

opacity:0;
animation:fadeIn 1s ease forwards;
animation-delay:2.3s;
}

.footer a{
color:#fff;
text-decoration:none;
opacity:.9;
transition:.3s;
}

.footer a:hover{
opacity:.6;
}

.email-icon{
width:18px;
height:18px;
fill:#fff;
opacity:.9;
}

/* HOVER */

.container:hover .logo{
transform:translateY(-1px);
transition:.4s ease;
}

/* OVERLAY DEVTOOLS */

#devtools-overlay{
position:fixed;
inset:0;
background:#000;
color:#fff;
display:none;
align-items:center;
justify-content:center;
z-index:9999;

font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
}

/* ANIMAÇÕES */

@keyframes logoFade{
to{opacity:1;}
}

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes shineMove{
0%{background-position:-200% center;}
100%{background-position:200% center;}
}

/* MOBILE */

@media (max-width:600px){

.logo{
width:96vw;
max-height:68vh;
}

.text{
font-size:10px;
letter-spacing:5px;
}

.line{
width:60px;
}

.footer{
font-size:12px;
bottom:8px;
}

}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="https://invul.netlify.app/invul.png" alt="INVUL Logo">

<div class="line"></div>

<div class="text">
EM BREVE
</div>

</div>

<div class="footer">

<svg class="email-icon" viewBox="0 0 24 24">
<path d="M2 4h20v16H2V4zm10 9L3 6v12h18V6l-9 7z"/>
</svg>

<a href="mailto:contato@invul.com.br">
contato@invul.com.br
</a>

</div>

<div id="devtools-overlay">
acesso restrito
</div>

<script>

document.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('keydown',function(e){

if(e.key==='F12') e.preventDefault();

if(e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase()))
e.preventDefault();

if(e.ctrlKey && ['U','S'].includes(e.key.toUpperCase()))
e.preventDefault();

});

(function(){

const threshold=160;
const overlay=document.getElementById('devtools-overlay');

setInterval(()=>{

const widthDiff=window.outerWidth-window.innerWidth;
const heightDiff=window.outerHeight-window.innerHeight;

if(widthDiff>threshold || heightDiff>threshold){
overlay.style.display='flex';
}else{
overlay.style.display='none';
}

},500);

})();

</script>

</body>
</html>
